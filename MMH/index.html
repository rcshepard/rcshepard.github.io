<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Chicagoland Maternal Mental Health Providers</title>

  <!-- Leaflet CSS -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"
  />
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"
  />

  <style>
/* =========
   GLOBAL
   ========= */
:root {
  /* Brand-ish palette tuned to your marker colors */
  --mmh-red: #800000;
  --mmh-blue: #007396;
  --mmh-violet: #59315f;

  --mmh-bg: #f5f6f8;
  --mmh-panel-bg: #ffffff;
  --mmh-border-subtle: #dde1e7;
  --mmh-text-main: #222222;
  --mmh-text-muted: #666666;
  --mmh-accent: #0f766e;   /* teal accent for focus / links */
  --mmh-shadow-soft: 0 10px 30px rgba(15, 23, 42, 0.12);
  --mmh-radius-lg: 10px;
  --mmh-radius-sm: 4px;
}

html,
body {
  height: 100%;
  margin: 0;
  padding: 0;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  color: var(--mmh-text-main);
  background: radial-gradient(circle at top left, #eef2ff 0, #f5f6f8 35%, #f9fafb 100%);
}

/* Map should sit under the UI like a full-page app */
#map {
  width: 100%;
  height: 100%;
}

/* Remove default focus styles but keep accessibility */
:focus {
  outline: 2px solid var(--mmh-accent);
  outline-offset: 2px;
}

/* =========
   ICON CLASSES (LEGACY SUPPORT)
   ========= */
.agency-icon,
.individual-icon {
  display: inline-block;
  width: 20px; /* match iconSize if used in JS */
  height: 20px;
  background-size: contain;
  background-repeat: no-repeat;
  background-position: center;
}

.agency-icon {
  background-image: url('https://rcshepard.github.io/MMH/agency-icon.png');
}

.individual-icon {
  background-image: url('https://rcshepard.github.io/MMH/individual-icon.png');
}

/* =========
   FILTER PANEL
   ========= */
.controls-container {
  position: absolute;
  top: 18px;
  left: 18px;
  z-index: 1000;
  background: var(--mmh-panel-bg);
  border-radius: var(--mmh-radius-lg);
  box-shadow: var(--mmh-shadow-soft);
  padding: 18px 20px 16px;
  max-width: 380px;
  font-size: 15px;
  border: 1px solid rgba(148, 163, 184, 0.35);
}

/* Title */
.controls-container h3 {
  margin: 0 0 12px;
  font-size: 18px;
  font-weight: 600;
  letter-spacing: 0.02em;
  color: #0f172a;
}

/* Filter labels (checkbox lines) */
.controls-container label {
  display: flex;
  align-items: flex-start;
  margin: 6px 0;
  cursor: pointer;
  line-height: 1.4;
  color: var(--mmh-text-main);
}

/* Checkbox styling */
.controls-container input[type="checkbox"] {
  margin-right: 10px;
  margin-top: 2px;
  width: 18px;
  height: 18px;
  flex-shrink: 0;
  accent-color: var(--mmh-accent);
}

/* Second-line explanatory text (e.g., prescriber details) */
.controls-container label small {
  font-size: 12px;
  color: var(--mmh-text-muted);
}

/* Descriptive text under CDPH checkbox */
.controls-container > small {
  font-size: 12px;
  color: var(--mmh-text-muted) !important;
}

/* Divider line between checkboxes and search */
.controls-container hr {
  border: 0;
  border-top: 1px solid var(--mmh-border-subtle);
  margin: 12px 0 10px;
}

/* Neighborhood search label / wrapper */
.controls-container .fuzzy-search-label {
  margin: 4px 0 0;
}

.controls-container .fuzzy-search-label label {
  font-size: 13px;
  font-weight: 500;
  margin-bottom: 4px;
  color: var(--mmh-text-muted);
}

/* Text input */
.controls-container input[type="text"] {
  width: 100%;
  font-size: 14px;
  padding: 7px 9px;
  margin-top: 3px;
  box-sizing: border-box;
  border-radius: 6px;
  border: 1px solid var(--mmh-border-subtle);
  background-color: #f9fafb;
  transition: border-color 0.15s ease, box-shadow 0.15s ease, background-color 0.15s ease;
}

.controls-container input[type="text"]:focus {
  border-color: var(--mmh-accent);
  background-color: #ffffff;
  box-shadow: 0 0 0 1px rgba(15, 118, 110, 0.2);
}

/* Make CDPH link feel like a subtle inline link */
.controls-container a {
  color: var(--mmh-accent);
  text-decoration: none;
}

.controls-container a:hover,
.controls-container a:focus {
  text-decoration: underline;
}

/* =========
   LEAFLET ZOOM CONTROL (ENLARGED)
   ========= */
.leaflet-control-zoom.leaflet-bar {
  transform: scale(1.6);
  transform-origin: top right;
}

/* Adjust internal button dimensions */
.leaflet-control-zoom.leaflet-bar a {
  width: 26px;
  height: 26px;
  line-height: 26px;
  font-size: 18px;
}

/* =========
   LEGEND
   ========= */
.info.legend {
  background: rgba(255, 255, 255, 0.96);
  padding: 10px 12px;
  font: 13px/18px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  box-shadow: var(--mmh-shadow-soft);
  border-radius: var(--mmh-radius-lg);
  border: 1px solid rgba(148, 163, 184, 0.35);
  color: var(--mmh-text-main);
}

.info.legend h4 {
  margin: 0 0 6px;
  font-size: 13px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: #475569;
}

.info.legend div {
  display: flex;
  align-items: center;
  margin-bottom: 4px;
}

.info.legend i {
  width: 14px;
  height: 14px;
  margin-right: 7px;
  border-radius: 50%;
  display: inline-block;
  box-shadow: 0 0 0 1px rgba(15, 23, 42, 0.18);
}

/* =========
   POPUPS
   ========= */
.provider-popup {
  font-size: 14px;
  color: #1f2933;
}

.provider-popup-title {
  font-size: 16px;
  font-weight: 700;
  margin-bottom: 4px;
  display: inline-block;
  color: #111827;
}

/* Popup website link */
.provider-popup a {
  color: var(--mmh-accent);
  text-decoration: none;
  font-size: 13px;
}

.provider-popup a:hover,
.provider-popup a:focus {
  text-decoration: underline;
}

/* Popup table for provider details */
.provider-popup table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 6px;
}

.provider-popup th,
.provider-popup td {
  padding: 3px 0;
  vertical-align: top;
  font-size: 13px;
}

.provider-popup th {
  width: 40%;
  font-weight: 600;
  color: var(--mmh-text-muted);
  padding-right: 6px;
}

.provider-popup td {
  color: var(--mmh-text-main);
}

/* Separator between stacked provider entries */
.leaflet-popup-content hr {
  border: 0;
  border-top: 1px solid #e5e7eb;
  margin: 10px 0;
}

/* =========
   COUNT LABELS ON CIRCLES
   ========= */
.provider-count-label {
  background: transparent;
  border: none;
  box-shadow: none;
  font-weight: 700;
  color: #ffffff;
  text-shadow:
    0 1px 2px rgba(0, 0, 0, 0.35),
    0 0 1px rgba(0, 0, 0, 0.4);
}

/* Optional: fine-tune tooltip padding */
.leaflet-tooltip.provider-count-label {
  padding: 0;
}

/* =========
   RESPONSIVE TWEAKS
   ========= */
@media (max-width: 768px) {
  .controls-container {
    top: 10px;
    left: 50%;
    transform: translateX(-50%);
    width: calc(100% - 24px);
    max-width: 440px;
    padding: 16px 16px 12px;
  }

  .leaflet-control-zoom.leaflet-bar {
    transform: scale(1.4);
  }
}
  </style>
</head>
<body>
  <div id="map"></div>
  <div class="controls-container" id="filters">
    <h3>Filter providers</h3>

<label>
  <input type="checkbox" id="filterPMHC" />
  Has PMH-C specialist
</label>
<label>
  <input type="checkbox" id="filterMedicaid" />
  Accepts Medicaid
</label>
<label>
  <input type="checkbox" id="filterVirtual" />
  Offers virtual services
</label>
<label>
  <input type="checkbox" id="filterTherapist" />
  Mental health therapist
</label>
<label>
  <input type="checkbox" id="filterPrescriber" />
  Perinatal prescriber
  <br>
  <small>&thinsp;&#40;psychiatrists, physicians,APRNs&#41;</small>
</label>
<label>
  <input type="checkbox" id="filterCDPH" />
  Show&nbsp;<a href="https://www.chicago.gov/city/en/depts/cdph/supp_info/behavioral-health/mental_health_centers.html">CDPH mental health clinics</a>
</label>
    <small style="display:block;padding-left:32px;color:#444;">
      Not perinatal specific, but available to Chicagoans regardless of ability to pay, immigration status, or health insurance
    </small>    <hr />
    <div class="fuzzy-search-label">
      <label for="fuzzySearchInput">Neighborhood search</label>
      <input type="text" id="fuzzySearchInput" placeholder="Fuzzy search by Neighborhood..." />
    </div>

    <!-- <small> -->
      <!-- This is a proof of concept map of maternal mental health providers in Chicagoland. -->
    <!-- </small> -->
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""></script>
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
  <script src="https://unpkg.com/papaparse@5.4.1/papaparse.min.js"></script>
  <!-- Add Fuse.js -->
  <script src="https://cdn.jsdelivr.net/npm/fuse.js@6.6.2"></script>

  <script>
    // --- CONFIG ---
    const csvFilePath = 'https://rcshepard.github.io/MMH/MMH_for_GIS.csv';
    const hiddenFields = [
  'LATITUDE',
  'LONGITUDE',
  'ID',
  'NAME',
  'URL',
  'CITY',
  'STATE',
  'ZIP',
  'AGENCY_INDIVIDUAL',
  'NUM_PROVIDERS',
  'NEIGHBORHOODS'
];
    const map = L.map('map', { zoomControl: true}).setView([41.88, -87.63], 11);

    // Basemap layer
    L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Topo_Map/MapServer/tile/{z}/{y}/{x}', {
      attribution: 'Tiles &copy; Esri &mdash; Esri, DeLorme, NAVTEQ, TomTom, Intermap, iPC, USGS, FAO, NPS, NRCAN, GeoBase, Kadaster NL, Ordnance Survey, Esri Japan, METI, Esri China (Hong Kong), and the GIS User Community'
    }).addTo(map);

    // Add gray GeoJSON mask layer above the base map
    fetch('https://rcshepard.github.io/MMH/nosuburbs.geojson')
      .then(response => response.json())
      .then(geojsonData => {
        L.geoJSON(geojsonData, {
          style: {
            color: '#444',         
            fillColor: '#666',     
            fillOpacity: 0.7,      
            weight: 1
          }
        }).addTo(map);
      });

    const markersLayerGroup = L.layerGroup().addTo(map);
    let allProviderData = [];
    let fuse = null;        
    let lastFuzzy = '';     

// Map raw column names to nicer labels for the popup table
const fieldLabelMap = {
  'ADDRESS': 'Address',
  'VIRTUAL': 'Virtual options',
  'MEDICAID': 'Accepts Medicaid',
  'PMH_C': 'PMH Certified',
  'CDPH': 'CDPH'
};

// Convert "Y"/"N" to "Yes"/"No" for selected fields
function formatFieldValue(key, rawValue) {
  const ynFields = ['VIRTUAL', 'MEDICAID', 'PMH_C', 'CDPH'];
  if (ynFields.includes(key)) {
    const val = String(rawValue).trim().toUpperCase();
    if (val === 'Y') return 'Yes';
    if (val === 'N') return 'No';
  }
  return rawValue;
}

    function buildPopupHtml(row) {
      const url = row.URL && row.URL.trim() ? row.URL.trim() : null;
      const name = row.NAME || 'Provider';
let html = '<div class="provider-popup">';
html += '<span class="provider-popup-title">' + name + '</span>';
      if (url) {
        const safeUrl = url.startsWith('https') ? url : 'https://' + url;
        html += '<br/><a href="' + safeUrl + '" target="_blank" rel="noopener noreferrer">Website</a>';
      }
        html += '<br/><br/><table>';
  for (const key in row) {
    if (!row.hasOwnProperty(key) || hiddenFields.includes(key) || key.startsWith('Unnamed')) continue;

    const rawValue = row[key];
    const valueStr = rawValue == null ? '' : String(rawValue).trim();
    if (valueStr === '') continue;

    // Use friendly label if defined, otherwise fall back to a cleaned-up key
    const label = fieldLabelMap[key] || key.replace(/_/g, ' ');

    // Convert Y/N to Yes/No where appropriate
    const formattedValue = formatFieldValue(key, valueStr);

    html += '<tr><th>' + label + ':</th><td>' + formattedValue + '</td></tr>';
  }
  html += '</table></div>';
      return html;
    }

// NEW: define two Leaflet icons that use your PNG files
const agencyIcon = L.icon({
  iconUrl: 'https://rcshepard.github.io/MMH/agency-icon.png',      // adjust path if needed
  iconSize:     [32, 32],
  iconAnchor:   [16, 32],
  popupAnchor:  [0, -32]
});

const individualIcon = L.icon({
  iconUrl: 'https://rcshepard.github.io/MMH/individual-icon.png',  // adjust path if needed
  iconSize:     [32, 32],
  iconAnchor:   [16, 32],
  popupAnchor:  [0, -32]
});

function createProviderMarker(row) {
  const lat = parseFloat(row.LATITUDE);
  const lng = parseFloat(row.LONGITUDE);
  if (isNaN(lat) || isNaN(lng)) return null;

  const numProviders = row.NUM_PROVIDERS ? parseInt(row.NUM_PROVIDERS, 10) : null;
  const type = (row.AGENCY_INDIVIDUAL || '').toString().trim().toUpperCase();
  const isAgency = type === 'AGENCY' || type === 'A' || type === 'AGENCIES';

  // CHANGED: instead of divIcon + span class, pick one of the two image icons
  const icon = isAgency ? agencyIcon : individualIcon;

  // UNCHANGED: create marker with that icon
  const marker = L.marker([lat, lng], { icon });

  if (!isNaN(numProviders) && numProviders > 0) {
    const labelHtml = '<div class="provider-label">' + numProviders + '</div>';
    marker.bindTooltip(labelHtml, {
      permanent: true,
      direction: 'top',
      className: 'provider-count-label'
    });
  }

  marker.bindPopup(buildPopupHtml(row));
  return marker;
}

function passesFilters(row, filters) {
  if (filters.virtual && String(row.VIRTUAL).toUpperCase() !== 'Y') return false;
  if (filters.medicaid && String(row.MEDICAID).toUpperCase() !== 'Y') return false;
  if (filters.pmhc && String(row.PMH_C).toUpperCase() !== 'Y') return false;

  // --- NEW: ID-based filters ---
  const idStr = (row.ID || '').toString().trim();
  const isPrescriber = idStr.startsWith('2');
  const isTherapist = !isPrescriber;  // everything else

  // If prescriber filter is on and therapist filter is off → must be prescriber
  if (filters.prescriber && !filters.therapist && !isPrescriber) return false;

  // If therapist filter is on and prescriber filter is off → must be therapist
  if (filters.therapist && !filters.prescriber && !isTherapist) return false;

  // If both are checked, or both are unchecked, we don't constrain by ID.

  return true;
}

    const clusterRadiusMeters = 100;
    function clusterMarkers(markers) {
      const clusters = [];
      markers.forEach(marker => {
        const latLng = marker.getLatLng();
        let foundCluster = null;
        for (let i = 0; i < clusters.length; i++) {
          const clusterCenter = clusters[i].latLng;
          const distance = map.distance(latLng, clusterCenter);
          if (distance <= clusterRadiusMeters) {
            foundCluster = clusters[i];
            break;
          }
        }
        if (foundCluster) {
          foundCluster.markers.push(marker);
          const len = foundCluster.markers.length;
          const avgLat =
            (foundCluster.latLng.lat * (len - 1) + latLng.lat) / len;
          const avgLng =
            (foundCluster.latLng.lng * (len - 1) + latLng.lng) / len;
          foundCluster.latLng = L.latLng(avgLat, avgLng);
        } else {
          clusters.push({
            latLng: latLng,
            markers: [marker]
          });
        }
      });
      return clusters;
    }
	
	function classifyType(row) {
  // Normalize AGENCY_INDIVIDUAL field
  const type = (row.AGENCY_INDIVIDUAL || '').toString().trim().toUpperCase();
  if (!type) return 'unknown';

  // Adjust logic if your data uses different codes
  if (type === 'AGENCY' || type === 'A' || type === 'AGENCIES') return 'agency';
  if (type === 'INDIVIDUAL' || type === 'I' || type === 'INDIVIDUALS') return 'individual';

  // Fallback: if the field literally says "MIXED" or similar:
  if (type === 'MIXED' || type === 'BOTH') return 'mixed';

  return 'unknown';
}

function getColorForType(typesSet) {
  // typesSet is a Set like { 'agency' } or { 'individual', 'agency' }

  const hasAgency = typesSet.has('agency');
  const hasIndividual = typesSet.has('individual');

  // Brand colors:
  // red:    #800000
  // blue:   #007396
  // violet: #59315F

  if (hasAgency && hasIndividual) return '#59315F';  // violet
  if (hasAgency) return '#007396';                   // blue
  if (hasIndividual) return '#800000';               // red

  // default/unknown
  return '#666666';
}

function applyFiltersAndRender() {
  const filters = {
    virtual: document.getElementById('filterVirtual').checked,
    medicaid: document.getElementById('filterMedicaid').checked,
    pmhc: document.getElementById('filterPMHC').checked,
    cdph: document.getElementById('filterCDPH').checked,
	prescriber: document.getElementById('filterPrescriber').checked,
	therapist: document.getElementById('filterTherapist').checked   // NEW
  };
  lastFuzzy = document.getElementById('fuzzySearchInput').value.trim();
  markersLayerGroup.clearLayers();

  // CDPH filtering logic
  let rowsFiltered = allProviderData.filter(row => {
    if (filters.cdph) {
      // Only show CDPH backup sites
      return String(row.CDPH).toUpperCase() === 'Y';
    } else {
      // Hide CDPH backups
      return String(row.CDPH).toUpperCase() !== 'Y';
    }
  });

  // Apply the other filters
  rowsFiltered = rowsFiltered.filter(row => passesFilters(row, filters));

  // Fuzzy search by NEIGHBORHOODS
  if (lastFuzzy && fuse) {
    const fuseResults = fuse.search(lastFuzzy);
    const ids = new Set(fuseResults.map(res => res.item.ID));
    rowsFiltered = rowsFiltered.filter(row => ids.has(row.ID));
  }

  if (!rowsFiltered.length) return;

  // --- Aggregate by coordinate ---
  // Use a small rounding to avoid floating-point mismatches
  const coordMap = new Map(); 
  rowsFiltered.forEach(row => {
    const lat = parseFloat(row.LATITUDE);
    const lng = parseFloat(row.LONGITUDE);
    if (isNaN(lat) || isNaN(lng)) return;

    const latKey = lat.toFixed(6);
    const lngKey = lng.toFixed(6);
    const key = latKey + ',' + lngKey;

    const numProviders = row.NUM_PROVIDERS ? parseInt(row.NUM_PROVIDERS, 10) : 1;
    const type = classifyType(row);

    if (!coordMap.has(key)) {
      coordMap.set(key, {
        lat: lat,
        lng: lng,
        totalProviders: 0,
        types: new Set(),
        rows: []
      });
    }
    const entry = coordMap.get(key);
    entry.totalProviders += (isNaN(numProviders) ? 1 : numProviders);
    if (type !== 'unknown') entry.types.add(type);
    entry.rows.push(row);
  });

  const circles = [];
  const scaleFactor = 3;  // adjust to taste

  coordMap.forEach(entry => {
    const count = entry.totalProviders || entry.rows.length;
    const color = getColorForType(entry.types);
    const radius = Math.max(6, Math.sqrt(count) * scaleFactor);

    const circle = L.circleMarker([entry.lat, entry.lng], {
      radius: radius,
      color: color,
      weight: 2,
      fillColor: color,
      fillOpacity: 0.6
    }).addTo(markersLayerGroup);

    // Tooltip: total count
    circle.bindTooltip(
      '<div class="provider-label">' + count + '</div>',
      {
        permanent: true,
        direction: 'center',
        className: 'provider-count-label'
      }
    );

    // Popup: combined details of all rows at this location
    circle.on('click', () => {
      let html = '';
      entry.rows.forEach((row, idx) => {
        const content = buildPopupHtml(row);
        if (content) {
          if (html !== '') { html += '<hr/>'; }
          html += content;
        }
      });
      circle.bindPopup(html).openPopup();
    });

    circles.push(circle);
  });
//Come back to this section if you want to get the zoom to fit the points...
  <!-- if (circles.length) { -->
    <!-- const group = L.featureGroup(circles); -->
    <!-- const bounds = group.getBounds().pad(0.2); -->

    <!-- // Use fitBounds, but clamp resulting zoom so it never goes out past 10 -->
    <!-- map.fitBounds(bounds); -->

    <!-- // If fitBounds chose a zoom less than 10 (too zoomed out), force it back in -->
    <!-- if (map.getZoom() < 12) { -->
      <!-- map.setZoom(12); -->
      <!-- // Optionally, recenter on the bounds center so you're still roughly over Chicago -->
      <!-- map.panTo(bounds.getCenter()); -->
    <!-- } -->
  <!-- } -->
}

    Papa.parse(csvFilePath, {
      header: true,
      download: true,
      dynamicTyping: false,
      complete: function(results) {
        const rows = results.data.filter(row => {
          const hasId = row.ID && String(row.ID).trim() !== '';
          const hasName = row.NAME && String(row.NAME).trim() !== '';
          return hasId || hasName;
        });
        allProviderData = rows;
        fuse = new Fuse(allProviderData, {
          keys: ['NEIGHBORHOODS'],
          threshold: 0.4,
          ignoreLocation: true
        });
		

        applyFiltersAndRender();
      },
      error: function(err) {
        console.error('Error loading CSV:', err);
        alert('Failed to load provider data CSV. Check console for details.');
      }
    });

document.getElementById('filterVirtual').addEventListener('change', applyFiltersAndRender);
document.getElementById('filterMedicaid').addEventListener('change', applyFiltersAndRender);
document.getElementById('filterPMHC').addEventListener('change', applyFiltersAndRender);
document.getElementById('filterCDPH').addEventListener('change', applyFiltersAndRender);
document.getElementById('filterPrescriber').addEventListener('change', applyFiltersAndRender); // NEW
document.getElementById('filterTherapist').addEventListener('change', applyFiltersAndRender);  // NEW
document.getElementById('fuzzySearchInput').addEventListener('input', applyFiltersAndRender);
	
	 // --- LEGEND CONTROL ---
    const legend = L.control({ position: 'bottomright' });

    legend.onAdd = function (map) {
      const div = L.DomUtil.create('div', 'info legend');

div.innerHTML =
  '<h4>Provider Type</h4>' +
  '<div><i style="background:#800000"></i>Individual</div>' +
