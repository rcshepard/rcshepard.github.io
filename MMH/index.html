<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Chicagoland Maternal Mental Health Providers (Proof of Concept)</title>

  <!-- Leaflet CSS -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"
  />
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"
  />

  <style>
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    #map { width: 100%; height: 100%; }
  .agency-icon,
  .individual-icon {
    display: inline-block;
    width: 20px;        /* match iconSize in JS */
    height: 20px;
    background-size: contain;
    background-repeat: no-repeat;
    background-position: center;
  }
   /* Legend styling */
    .info.legend {
      background: white;
      padding: 8px 10px;
      font: 14px/18px Arial, Helvetica, sans-serif;
      box-shadow: 0 1px 4px rgba(0,0,0,0.3);
      border-radius: 4px;
    }
    .info.legend h4 {
      margin: 0 0 6px 0;
      font-size: 14px;
    }
    .info.legend div {
      display: flex;
      align-items: center;
      margin-bottom: 4px;
    }
    .info.legend i {
      width: 14px;
      height: 14px;
      margin-right: 6px;
      border-radius: 50%;
      display: inline-block;
    }

  .agency-icon {
    background-image: url('https://rcshepard.github.io/MMH/agency-icon.png');       /* adjust path if needed */
  }

  .individual-icon {
    background-image: url('https://rcshepard.github.io/MMH/individual-icon.png');   /* adjust path if needed */
  }

  /* Optional label style, since you use provider-label and provider-count-label */
.provider-count-label {
  background: transparent;
  border: none;
  box-shadow: none;
  font-weight: bold;
  color: #ffffff;
}

    .controls-container {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 1000;
      background: white;
      padding: 14px 16px;
      border-radius: 4px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.3);
      font-size: 18px;
      max-width: 300px;
    }
    .controls-container h3 { margin: 0 0 8px 0; font-size: 20px; }
    .controls-container label {
      display: flex;
      align-items: center;
      margin: 4px 0;
      cursor: pointer;
      line-height: 1.4;
    }
    .controls-container input[type="checkbox"] {
      width: 20px; height: 20px; margin-right: 10px; transform: scale(1.3);
    }
    .controls-container small { font-size: 12px; }
    .controls-container .fuzzy-search-label { margin: 6px 0 12px 0; }
    .controls-container input[type="text"] {
      width: 100%; font-size: 16px; padding: 4px 6px; margin-top: 3px;
      box-sizing: border-box; border-radius: 2px; border: 1px solid #ccc;
    }
  </style>
</head>
<body>
  <div id="map"></div>
  <div class="controls-container" id="filters">
    <h3>Filter providers</h3>
    <label>
      <input type="checkbox" id="filterVirtual" />
      Offers virtual services
    </label>
    <label>
      <input type="checkbox" id="filterMedicaid" />
      Accepts Medicaid
    </label>
    <label>
      <input type="checkbox" id="filterPMHC" />
      Has PMH-C specialist
    </label>
    <label>
      <input type="checkbox" id="filterCDPH" />
      Show additional CDPH providers
    </label>
    <small style="display:block;padding-left:32px;color:#444;">
      Not perinatal specific, but open to all.
    </small>
    <div class="fuzzy-search-label">
      <label for="fuzzySearchInput">Neighborhood search</label>
      <input type="text" id="fuzzySearchInput" placeholder="Fuzzy search by Neighborhood..." />
    </div>
    <hr />
    <small>
      This is a proof of concept map of maternal mental health providers in Chicagoland.
    </small>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""></script>
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
  <script src="https://unpkg.com/papaparse@5.4.1/papaparse.min.js"></script>
  <!-- Add Fuse.js -->
  <script src="https://cdn.jsdelivr.net/npm/fuse.js@6.6.2"></script>

  <script>
    // --- CONFIG ---
    const csvFilePath = 'https://rcshepard.github.io/MMH/MMH_for_GIS.csv';
    const hiddenFields = ['LATITUDE', 'LONGITUDE'];
    const map = L.map('map').setView([41.88, -87.63], 12);

    // Basemap layer
    L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Topo_Map/MapServer/tile/{z}/{y}/{x}', {
      attribution: 'Tiles &copy; Esri &mdash; Esri, DeLorme, NAVTEQ, TomTom, Intermap, iPC, USGS, FAO, NPS, NRCAN, GeoBase, Kadaster NL, Ordnance Survey, Esri Japan, METI, Esri China (Hong Kong), and the GIS User Community'
    }).addTo(map);

    // Add gray GeoJSON mask layer above the base map
    fetch('https://rcshepard.github.io/MMH/nosuburbs.geojson')
      .then(response => response.json())
      .then(geojsonData => {
        L.geoJSON(geojsonData, {
          style: {
            color: '#444',         
            fillColor: '#666',     
            fillOpacity: 0.7,      
            weight: 1
          }
        }).addTo(map);
      });

    const markersLayerGroup = L.layerGroup().addTo(map);
    let allProviderData = [];
    let fuse = null;        
    let lastFuzzy = '';     

    function buildPopupHtml(row) {
      const url = row.URL && row.URL.trim() ? row.URL.trim() : null;
      const name = row.NAME || 'Provider';
      let html = '<div class="provider-popup">';
      html += '<strong>' + name + '</strong>';
      if (url) {
        const safeUrl = url.startsWith('https') ? url : 'https://' + url;
        html += '<br/><a href="' + safeUrl + '" target="_blank" rel="noopener noreferrer">Website</a>';
      }
      html += '<br/><br/><table>';
      for (const key in row) {
        if (!row.hasOwnProperty(key) || hiddenFields.includes(key) || key.startsWith('Unnamed')) continue;
        let label = key.replace(/_/g, ' ');
        const value = row[key] == null ? '' : String(row[key]).trim();
        if (value === '') continue;
        html += '<tr><th>' + label + '</th><td>' + value + '</td></tr>';
      }
      html += '</table></div>';
      return html;
    }

// NEW: define two Leaflet icons that use your PNG files
const agencyIcon = L.icon({
  iconUrl: 'https://rcshepard.github.io/MMH/agency-icon.png',      // adjust path if needed
  iconSize:     [32, 32],
  iconAnchor:   [16, 32],
  popupAnchor:  [0, -32]
});

const individualIcon = L.icon({
  iconUrl: 'https://rcshepard.github.io/MMH/individual-icon.png',  // adjust path if needed
  iconSize:     [32, 32],
  iconAnchor:   [16, 32],
  popupAnchor:  [0, -32]
});

function createProviderMarker(row) {
  const lat = parseFloat(row.LATITUDE);
  const lng = parseFloat(row.LONGITUDE);
  if (isNaN(lat) || isNaN(lng)) return null;

  const numProviders = row.NUM_PROVIDERS ? parseInt(row.NUM_PROVIDERS, 10) : null;
  const type = (row.AGENCY_INDIVIDUAL || '').toString().trim().toUpperCase();
  const isAgency = type === 'AGENCY' || type === 'A' || type === 'AGENCIES';

  // CHANGED: instead of divIcon + span class, pick one of the two image icons
  const icon = isAgency ? agencyIcon : individualIcon;

  // UNCHANGED: create marker with that icon
  const marker = L.marker([lat, lng], { icon });

  if (!isNaN(numProviders) && numProviders > 0) {
    const labelHtml = '<div class="provider-label">' + numProviders + '</div>';
    marker.bindTooltip(labelHtml, {
      permanent: true,
      direction: 'top',
      className: 'provider-count-label'
    });
  }

  marker.bindPopup(buildPopupHtml(row));
  return marker;
}

    function passesFilters(row, filters) {
      if (filters.virtual && String(row.VIRTUAL).toUpperCase() !== 'Y') return false;
      if (filters.medicaid && String(row.MEDICAID).toUpperCase() !== 'Y') return false;
      if (filters.pmhc && String(row.PMH_C).toUpperCase() !== 'Y') return false;
      return true;
    }

    const clusterRadiusMeters = 100;
    function clusterMarkers(markers) {
      const clusters = [];
      markers.forEach(marker => {
        const latLng = marker.getLatLng();
        let foundCluster = null;
        for (let i = 0; i < clusters.length; i++) {
          const clusterCenter = clusters[i].latLng;
          const distance = map.distance(latLng, clusterCenter);
          if (distance <= clusterRadiusMeters) {
            foundCluster = clusters[i];
            break;
          }
        }
        if (foundCluster) {
          foundCluster.markers.push(marker);
          const len = foundCluster.markers.length;
          const avgLat =
            (foundCluster.latLng.lat * (len - 1) + latLng.lat) / len;
          const avgLng =
            (foundCluster.latLng.lng * (len - 1) + latLng.lng) / len;
          foundCluster.latLng = L.latLng(avgLat, avgLng);
        } else {
          clusters.push({
            latLng: latLng,
            markers: [marker]
          });
        }
      });
      return clusters;
    }
	
	function classifyType(row) {
  // Normalize AGENCY_INDIVIDUAL field
  const type = (row.AGENCY_INDIVIDUAL || '').toString().trim().toUpperCase();
  if (!type) return 'unknown';

  // Adjust logic if your data uses different codes
  if (type === 'AGENCY' || type === 'A' || type === 'AGENCIES') return 'agency';
  if (type === 'INDIVIDUAL' || type === 'I' || type === 'INDIVIDUALS') return 'individual';

  // Fallback: if the field literally says "MIXED" or similar:
  if (type === 'MIXED' || type === 'BOTH') return 'mixed';

  return 'unknown';
}

function getColorForType(typesSet) {
  // typesSet is a Set like { 'agency' } or { 'individual', 'agency' }

  const hasAgency = typesSet.has('agency');
  const hasIndividual = typesSet.has('individual');

  if (hasAgency && hasIndividual) return '#800080';  // purple
  if (hasAgency) return '#0056b3';                   // blue
  if (hasIndividual) return '#cc0000';               // red

  // default/unknown
  return '#666666';
}

function applyFiltersAndRender() {
  const filters = {
    virtual: document.getElementById('filterVirtual').checked,
    medicaid: document.getElementById('filterMedicaid').checked,
    pmhc: document.getElementById('filterPMHC').checked,
    cdph: document.getElementById('filterCDPH').checked
  };
  lastFuzzy = document.getElementById('fuzzySearchInput').value.trim();
  markersLayerGroup.clearLayers();

  // CDPH filtering logic
  let rowsFiltered = allProviderData.filter(row => {
    if (filters.cdph) {
      // Only show CDPH backup sites
      return String(row.CDPH).toUpperCase() === 'Y';
    } else {
      // Hide CDPH backups
      return String(row.CDPH).toUpperCase() !== 'Y';
    }
  });

  // Apply the other filters
  rowsFiltered = rowsFiltered.filter(row => passesFilters(row, filters));

  // Fuzzy search by NEIGHBORHOODS
  if (lastFuzzy && fuse) {
    const fuseResults = fuse.search(lastFuzzy);
    const ids = new Set(fuseResults.map(res => res.item.ID));
    rowsFiltered = rowsFiltered.filter(row => ids.has(row.ID));
  }

  if (!rowsFiltered.length) return;

  // --- Aggregate by coordinate ---
  // Use a small rounding to avoid floating-point mismatches
  const coordMap = new Map(); 
  rowsFiltered.forEach(row => {
    const lat = parseFloat(row.LATITUDE);
    const lng = parseFloat(row.LONGITUDE);
    if (isNaN(lat) || isNaN(lng)) return;

    const latKey = lat.toFixed(6);
    const lngKey = lng.toFixed(6);
    const key = latKey + ',' + lngKey;

    const numProviders = row.NUM_PROVIDERS ? parseInt(row.NUM_PROVIDERS, 10) : 1;
    const type = classifyType(row);

    if (!coordMap.has(key)) {
      coordMap.set(key, {
        lat: lat,
        lng: lng,
        totalProviders: 0,
        types: new Set(),
        rows: []
      });
    }
    const entry = coordMap.get(key);
    entry.totalProviders += (isNaN(numProviders) ? 1 : numProviders);
    if (type !== 'unknown') entry.types.add(type);
    entry.rows.push(row);
  });

  const circles = [];
  const scaleFactor = 2.5;  // adjust to taste

  coordMap.forEach(entry => {
    const count = entry.totalProviders || entry.rows.length;
    const color = getColorForType(entry.types);
    const radius = Math.max(6, Math.sqrt(count) * scaleFactor);

    const circle = L.circleMarker([entry.lat, entry.lng], {
      radius: radius,
      color: color,
      weight: 2,
      fillColor: color,
      fillOpacity: 0.6
    }).addTo(markersLayerGroup);

    // Tooltip: total count
    circle.bindTooltip(
      '<div class="provider-label">' + count + '</div>',
      {
        permanent: true,
        direction: 'center',
        className: 'provider-count-label'
      }
    );

    // Popup: combined details of all rows at this location
    circle.on('click', () => {
      let html = '';
      entry.rows.forEach((row, idx) => {
        const content = buildPopupHtml(row);
        if (content) {
          if (html !== '') { html += '<hr/>'; }
          html += content;
        }
      });
      circle.bindPopup(html).openPopup();
    });

    circles.push(circle);
  });

  if (circles.length) {
    const group = L.featureGroup(circles);
    map.fitBounds(group.getBounds().pad(0.2));
  }
}

    Papa.parse(csvFilePath, {
      header: true,
      download: true,
      dynamicTyping: false,
      complete: function(results) {
        const rows = results.data.filter(row => {
          const hasId = row.ID && String(row.ID).trim() !== '';
          const hasName = row.NAME && String(row.NAME).trim() !== '';
          return hasId || hasName;
        });
        allProviderData = rows;
        fuse = new Fuse(allProviderData, {
          keys: ['NEIGHBORHOODS'],
          threshold: 0.4,
          ignoreLocation: true
        });
		

        applyFiltersAndRender();
      },
      error: function(err) {
        console.error('Error loading CSV:', err);
        alert('Failed to load provider data CSV. Check console for details.');
      }
    });

    document.getElementById('filterVirtual').addEventListener('change', applyFiltersAndRender);
    document.getElementById('filterMedicaid').addEventListener('change', applyFiltersAndRender);
    document.getElementById('filterPMHC').addEventListener('change', applyFiltersAndRender);
    document.getElementById('filterCDPH').addEventListener('change', applyFiltersAndRender);
    document.getElementById('fuzzySearchInput').addEventListener('input', applyFiltersAndRender);
	
	 // --- LEGEND CONTROL ---
    const legend = L.control({ position: 'bottomright' });

    legend.onAdd = function (map) {
      const div = L.DomUtil.create('div', 'info legend');

      div.innerHTML =
        '<h4>Provider Type</h4>' +
        '<div><i style="background:#cc0000"></i>Individual</div>' +
        '<div><i style="background:#0056b3"></i>Agency</div>' +
        '<div><i style="background:#800080"></i>Agency and Individual Providers</div>';

      return div;
    };

    legend.addTo(map);
  </script>
</body>
</html>
